name: Deploy AanganDevelopers to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Deploy frontend dist ──────────────────────────────────────────────
      - name: Copy frontend dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          source: "frontend/dist"
          target: "/home/ubuntu/Public/apps/AanganDevelopers"
          strip_components: 1   # removes the leading "frontend/" from the path
          rm: true

      # ── Deploy backend ────────────────────────────────────────────────────
      - name: Copy backend files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          source: "backend"
          target: "/home/ubuntu/Public/apps/AanganDevelopers"
          strip_components: 0
          rm: false

      # ── Write .env, install deps & restart PM2 ────────────────────────────
      - name: Write .env, install deps & restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script: |
            set -e
            cd /home/ubuntu/Public/apps/AanganDevelopers/backend
            # Write .env from GitHub secret (safe, never stored in repo)
            printf '%s' "$AANGAN_BACKEND_ENV" > .env
            npm install --omit=dev
            cd ~
            pm2 restart aangan-backend || pm2 start /home/ubuntu/Public/apps/AanganDevelopers/backend/server.js --name aangan-backend
            pm2 save
            sleep 3
            pm2 logs aangan-backend --lines 20 --nostream
            BACKEND_PORT=$(grep -E '^PORT=' /home/ubuntu/Public/apps/AanganDevelopers/backend/.env | cut -d= -f2 || echo 5001)
            curl -sf http://localhost:${BACKEND_PORT}/api/health && echo "✅ Backend is healthy" || echo "❌ Backend health check failed"
        env:
          AANGAN_BACKEND_ENV: ${{ secrets.AANGAN_BACKEND_ENV }}
